# Netlify configuration — Upskill example-page redesign
#
# Deploy model: Git integration (auto-deploy on push to main). No build step —
# the site is a single self-contained static file.
#
# SECURITY: publish is scoped to `site/` ONLY. The repository root holds
# .claude/, scripts/, CLAUDE.md and .env — none of which must ever be served.
# Netlify only uploads files under the publish directory, so nothing outside
# site/ is reachable on the public URL.

[build]
  publish = "site"
  # No command: static assets are committed as-is.
  command = ""

# Security headers applied to every response.
[[headers]]
  for = "/*"
  [headers.values]
    # Self-contained page: everything is same-origin. 'unsafe-inline' is required
    # only because the CSS and the small copy-button script are inlined in the
    # single HTML file; there is no external or user-supplied script surface.
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; object-src 'none'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"

# Long-cache nothing aggressively — the HTML must revalidate so redeploys show.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
