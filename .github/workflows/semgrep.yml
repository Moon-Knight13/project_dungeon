name: semgrep

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  # codeql-action/upload-sarif reads workflow-run metadata via the Actions API;
  # without this it fails with "Resource not accessible by integration".
  actions: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run semgrep
        shell: bash
        run: |
          set -euo pipefail
          # HOME=/tmp gives the non-root container user a writable home; without it
          # semgrep tries to create /.semgrep and fails with a PermissionError.
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "${{ github.workspace }}:/src" \
            semgrep/semgrep@sha256:c98edb09ae3abcc870171df7446fd2df8426a6a7f6ff14ca1ac47f4a25bf1666 \
            semgrep scan \
              --config /src/.semgrep.yml \
              --config p/secrets \
              --config p/security-audit \
              --error \
              --metrics=off \
              --sarif \
              --output /src/semgrep.sarif \
              /src

      # Skip upload on fork PRs: GitHub downgrades security-events to read there,
      # so the upload would always fail. The scan itself still runs and gates.
      - name: Upload SARIF to GitHub Security tab
        if: ${{ always() && hashFiles('semgrep.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: semgrep.sarif
