name: container-scan

on:
  pull_request:
    paths:
      - ".devcontainer/**"
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  # codeql-action/upload-sarif reads workflow-run metadata via the Actions API;
  # without this it fails with "Resource not accessible by integration".
  actions: read

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build devcontainer image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --file .devcontainer/Dockerfile \
            --build-arg CLAUDE_CODE_VERSION=latest \
            --tag devcontainer-scan:${{ github.sha }} \
            .

      # Report step: capture CRITICAL+HIGH for visibility in the Security tab.
      # exit-code 0 so this step never fails the job — the gate step below decides.
      - name: Trivy scan (report CRITICAL+HIGH to Security tab)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: devcontainer-scan:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      # Skip upload on fork PRs: GitHub downgrades security-events to read there,
      # so the upload would always fail. The Trivy gate step below still runs.
      - name: Upload Trivy SARIF to GitHub Security tab
        if: ${{ always() && hashFiles('trivy.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a
        with:
          sarif_file: trivy.sarif

      # Gate step: the devcontainer is a local dev sandbox (not a shipped
      # artifact) behind a deny-by-default firewall, so we block only on
      # CRITICAL findings. HIGHs are still reported above for visibility.
      # Base-image OS CVEs are cleared by `apt-get upgrade` in the Dockerfile.
      - name: Trivy gate (fail on CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: devcontainer-scan:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
