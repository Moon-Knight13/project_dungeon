repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      # gitleaks-system runs the sha256-pinned binary baked into the devcontainer
      # image (see GITLEAKS_VERSION in .devcontainer/Dockerfile — keep it in sync
      # with this rev). The default `gitleaks` hook is language: golang, which
      # builds from source and would need firewall egress to the Go toolchain
      # and module proxy. Entry already passes --redact --staged --verbose.
      # pass_filenames: false is set on the upstream golang hook but missing
      # from the system variant — without it pre-commit appends filenames as
      # positional args and gitleaks aborts ("accepts at most 1 arg(s)").
      - id: gitleaks-system
        args: ["--config=.gitleaks.toml"]
        pass_filenames: false

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.83.0
    hooks:
      - id: semgrep
        args: ["--config", ".semgrep.yml", "--error", "--metrics=off"]
        # semgrep 1.83.0's opentelemetry dependency imports pkg_resources, which
        # setuptools removed in v81. Pin a compatible setuptools so the hook's venv
        # works on Python 3.12+ hosts (CI uses the semgrep Docker image, unaffected).
        additional_dependencies: ["setuptools<81"]

  - repo: local
    hooks:
      # Fail fast if CODEOWNERS is reset to the template placeholder in a derived
      # repo. The weekly repository-audit already catches this, but only on its
      # Monday schedule; this catches a manual edit at commit time. No-op on the
      # template repo itself (placeholder is intentional there).
      - id: codeowners-no-placeholder
        name: CODEOWNERS has no template placeholder owner
        entry: scripts/check-codeowners.sh
        language: script
        files: ^\.github/CODEOWNERS$
        pass_filenames: false
